      <script>
        var auth = window.PANEL_STATIC.getAuth();

      console.log(json)
      if (json.error) {
        alert("You don't have ADMIN access! Request an Admin to give you access...")
        resetHL();
      }
      else {
        window.location.href="logs.html";
      }
    }
    function resetHL() {window.location.reload()}


      </script>
      <script src="./assets/editor.js"></script>
      <script>
        (function () {
          const tourKey = "aoi.panel.tour.editor.v3";
          const params = new URLSearchParams(window.location.search);
          const forceTour = params.get("tour") === "1";
          let started = false;
          let startBtn = null;

          function showStartButton(runTour) {
            if (!startBtn) {
              startBtn = document.getElementById("start-tour");
            }
            if (!startBtn) {
              return;
            }
            startBtn.style.display = "inline-block";
            startBtn.onclick = function () {
              runTour(true);
            };
          }

          function hideStartButton() {
            if (!startBtn) {
              startBtn = document.getElementById("start-tour");
            }
            if (!startBtn) {
              return;
            }
            startBtn.style.display = "none";
          }

          function loadShepherdFallback() {
            return new Promise(function (resolve) {
              if (window.Shepherd) {
                resolve(true);
                return;
              }
              const existing = document.getElementById("shepherd-fallback-js");
              if (existing) {
                existing.addEventListener("load", function () { resolve(Boolean(window.Shepherd)); }, { once: true });
                existing.addEventListener("error", function () { resolve(false); }, { once: true });
                return;
              }
              const script = document.createElement("script");
              script.id = "shepherd-fallback-js";
              script.src = "https://unpkg.com/shepherd.js@8.4.1/dist/js/shepherd.min.js";
              script.onload = function () { resolve(Boolean(window.Shepherd)); };
              script.onerror = function () { resolve(false); };
              document.head.appendChild(script);
            });
          }

          function hasTargets() {
            return Boolean(
              document.querySelector("#filelist") &&
              document.querySelector("#container") &&
              document.querySelector("#editor")
            );
          }

          function runTour(forceManual) {
            if (started) {
              return true;
            }
            if (!window.Shepherd || !hasTargets()) {
              return false;
            }
            if (!forceTour && !forceManual && localStorage.getItem(tourKey)) {
              showStartButton(runTour);
              return true;
            }

            started = true;
            hideStartButton();

            function settleStepTarget(selector) {
              return new Promise(function (resolve) {
                const el = document.querySelector(selector);
                if (!el) {
                  resolve();
                  return;
                }
                el.scrollIntoView({ behavior: "auto", block: "center", inline: "nearest" });
                requestAnimationFrame(function () {
                  requestAnimationFrame(resolve);
                });
              });
            }

            const tour = new Shepherd.Tour({
              useModalOverlay: true,
              defaultStepOptions: {
                cancelIcon: { enabled: true },
                scrollTo: false
              }
            });

            const finishTour = function () {
              localStorage.setItem(tourKey, "seen");
            };

            tour.on("complete", finishTour);
            tour.on("cancel", finishTour);

            tour.addStep({
              title: "File Explorer",
              text: "Browse folders and files from the synthetic workspace here.",
              attachTo: { element: "#filelistsjs", on: "right" },
              beforeShowPromise: function () {
                return settleStepTarget("#filelistsjs");
              },
              buttons: [{ text: "Next", action: tour.next }]
            });

            tour.addStep({
              title: "Code Editor",
              text: "Edit your selected file in this Monaco editor area.",
              attachTo: { element: "#container", on: "left" },
              beforeShowPromise: function () {
                return settleStepTarget("#container");
              },
              buttons: [
                { text: "Back", action: tour.back },
                { text: "Next", action: tour.next }
              ]
            });



            tour.addStep({
              title: "Done",
              text: "You are ready to navigate and edit the project files.",
              attachTo: { element: "#filelist", on: "right" },
              beforeShowPromise: function () {
                return settleStepTarget("#filelist");
              },
              buttons: [
                { text: "Back", action: tour.back },
                {
                  text: "Done",
                  action: function () {
                    finishTour();
                    return tour.complete();
                  }
                }
              ]
            });

            setTimeout(function () {
              tour.start();
            }, 250);
            return true;
          }

          function bootTour() {
            loadShepherdFallback().then(function () {
              let retries = 0;
              const maxRetries = 16;
              const timer = setInterval(function () {
                retries += 1;
                if (runTour(false)) {
                  clearInterval(timer);
                  return;
                }
                if (retries >= maxRetries) {
                  clearInterval(timer);
                  showStartButton(runTour);
                }
              }, 250);
            });
          }

          if (document.readyState === "complete" || document.readyState === "interactive") {
            bootTour();
          }
          window.addEventListener("load", bootTour);
        })();
      </script>
