<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Admin Login - Website Administrator Access">
    <link rel="icon" type="image/png" href="/persev/assets/persev.png" />
    <title>Admin Login - Perseverantia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
      @font-face {
        font-family: Mestizo;
        src: url(/persev/assets/MestizoFont.ttf);
      }
      
      .gradient-bg {
        background: linear-gradient(135deg, #0D122C 0%, #131D3F 100%);
      }
      
      .form-gradient {
        background: linear-gradient(90deg, #0D122C 0%, #131D3F 100%);
      }
      
      .input-field {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 2px solid rgba(190, 142, 48, 0.3);
        transition: all 0.3s ease;
      }
      
      .input-field:focus {
        background: rgba(255, 255, 255, 0.15);
        border-color: #BE8E30;
        outline: none;
        box-shadow: 0 0 20px rgba(190, 142, 48, 0.3);
      }
      
      .login-button {
        background: #081032;
        color: white;
        border: 4px solid #BE8E30;
        transition: all 0.3s ease;
      }
      
      .login-button:hover {
        background: #BE8E30;
        color: #081032;
        box-shadow: 0 0 25px rgba(190, 142, 48, 0.5);
        transform: translateY(-2px);
      }
      
      .logo-glow {
        filter: drop-shadow(0 0 20px rgba(190, 142, 48, 0.4));
      }
    </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shepherd.js/7.1.2/css/shepherd.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shepherd.js/7.1.2/js/shepherd.min.js"></script>
  <link rel="stylesheet" href="/persev/assets/app.css">
  <script src="/persev/assets/app.js"></script>
  <script src="/persev/assets/pages.js"></script>
</head>
  
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <!-- Login Container -->
    <div class="w-full max-w-md">
      <!-- Logo Section -->
      <div class="text-center mb-8">
        <img 
          src="/persev/assets/persevlogo.png" 
          alt="Perseverantia Logo" 
          class="w-24 h-24 mx-auto mb-4 logo-glow"
        />
        <h1 class="text-4xl text-white mb-2" style="font-family: Mestizo">
          Admin Portal
        </h1>
        <p class="text-gray-300 text-lg">
          Website Administrator Access
        </p>
      </div>

      <!-- Login Form -->
      <div class="form-gradient rounded-3xl p-8 shadow-2xl border border-[#BE8E30]/20">
        <!-- Error Message -->
        <div id="error-message" class="hidden mb-4 p-3 bg-red-500/20 border border-red-500/50 rounded-lg text-red-300 text-sm">
        </div>
        
        <!-- Success Message -->
        <div id="success-message" class="hidden mb-4 p-3 bg-green-500/20 border border-green-500/50 rounded-lg text-green-300 text-sm">
        </div>
        
        <form id="admin-login-form" class="space-y-6">
          <!-- Username Field -->
          <div>
            <label for="username" class="block text-white text-lg mb-2" style="font-family: Mestizo">
              Username
            </label>
            <input
              type="text"
              id="username"
              name="username"
              value="admin"
              required
              class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-300"
              placeholder="Enter admin username"
            />
          </div>

          <!-- Password Field -->
          <div>
            <label for="password" class="block text-white text-lg mb-2" style="font-family: Mestizo">
              Password
            </label>
            <input
              type="password"
              id="password"
              name="password"
              value="admin123"
              required
              class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-300"
              placeholder="Enter admin password"
            />
          </div>

          <!-- Login Button -->
          <button
            type="submit"
            id="login-btn"
            class="login-button w-full py-3 px-6 rounded-full text-lg font-medium"
            style="font-family: Mestizo"
          >
            Access Dashboard
          </button>
        </form>
      </div>

      <!-- Back to Home -->
      <div class="text-center mt-6">
        <a 
          href="/persev/" 
          class="text-gray-400 hover:text-white transition-colors inline-flex items-center"
        >
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          Back to Home
        </a>
      </div>
    </div>

    <!-- Background Decoration -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
      <div class="absolute -top-40 -right-40 w-80 h-80 bg-[#BE8E30] rounded-full opacity-10 blur-3xl"></div>
      <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-[#BE8E30] rounded-full opacity-10 blur-3xl"></div>
    </div>

    <!-- JavaScript -->
    <script>
      // CLIENT-SIDE only admin login for static deployments
      // WARNING: credentials are stored in this file and visible to anyone who views source.
      // Change these values to whatever you want locally.
      const ADMIN_USERNAME = 'admin';
      const ADMIN_PASSWORD = 'admin123';

      document.getElementById('admin-login-form').addEventListener('submit', function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const loginBtn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('error-message');
        const successMsg = document.getElementById('success-message');

        // Clear previous messages
        errorMsg.classList.add('hidden');
        successMsg.classList.add('hidden');

        // Disable button and show loading
        loginBtn.disabled = true;
        loginBtn.textContent = 'Accessing...';

        // Simple client-side check
        setTimeout(() => {
          if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
            // mark authenticated in localStorage for static mode
            localStorage.setItem('persev.admin.auth', '1');
            try {
              // also update mock state so fetch interceptions pass without checking localstorage every time
              let stateRaw = localStorage.getItem('persev.static.v1');
              if (stateRaw) {
                let state = JSON.parse(stateRaw);
                state.admin.authenticated = true;
                localStorage.setItem('persev.static.v1', JSON.stringify(state));
              }
            } catch(e) {}
            
            successMsg.textContent = 'Login successful! Redirecting...';
            successMsg.classList.remove('hidden');
            setTimeout(() => {
              window.location.href = '/persev/admin/dashboard';
            }, 700);
          } else {
            errorMsg.textContent = 'Invalid credentials';
            errorMsg.classList.remove('hidden');
          }

          loginBtn.disabled = false;
          loginBtn.textContent = 'Access Dashboard';
        }, 300);
      });

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const response = await fetch('/persev/admin/check-auth');
                if (response.ok) {
                    const result = await response.json();
                    if (result.authenticated) {
                        window.location.href = '/persev/admin/dashboard';
                    }
                }
            } catch (error) {
                console.log('Not authenticated');
            }
        });

        // Add some interactive effects
        const inputs = document.querySelectorAll('.input-field');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.classList.remove('focused');
            });
        });

        // --- Shepherd tour for admin login ---
        (function() {
          const STORAGE_KEY = 'persev.admin.login-tour.seen.v1';

          function createLoginTour() {
            const tour = new Shepherd.Tour({
              defaultStepOptions: {
                cancelIcon: { enabled: true },
                classes: 'shepherd-theme-arrows',
                scrollTo: { behavior: 'smooth', block: 'center' }
              },
              useModalOverlay: true
            });

            tour.addStep({
              id: 'step-username',
              title: 'Perseverantia',
              text: 'Enter the admin username here. Use "admin" for the static demo.',
              attachTo: { element: '#username', on: 'bottom' },
              buttons: [
                { text: 'Next', action: tour.next }
              ]
            });

            tour.addStep({
              id: 'step-password',
              title: 'Perseverantia',
              text: 'Now enter the password. Use "admin123" for the static demo.',
              attachTo: { element: '#password', on: 'bottom' },
              buttons: [
                { text: 'Back', action: tour.back },
                { text: 'Next', action: tour.next }
              ]
            });

            tour.addStep({
              id: 'step-submit',
              title: 'Perseverantia',
              text: 'Finally, click Access Dashboard to sign in.',
              attachTo: { element: '#login-btn', on: 'top' },
              buttons: [
                { text: 'Back', action: tour.back },
                { text: 'Finish', action: tour.complete }
              ]
            });

            tour.on('complete', () => {
              try { localStorage.setItem(STORAGE_KEY, '1'); } catch(e){}
              showLoginRestartButton();
            });

            tour.on('cancel', () => {
              showLoginRestartButton();
            });

            return tour;
          }

          let _loginTour = null;

          window.startLoginTour = function() {
            if (!_loginTour) _loginTour = createLoginTour();
            hideLoginRestartButton();
            _loginTour.start();
          };

          // Restart button UI using the same structure/styles as /persev/index.html
          function showLoginRestartButton() {
            if (document.getElementById('restart-tour-wrapper')) return;

            const wrapper = document.createElement('div');
            wrapper.id = 'restart-tour-wrapper';
            wrapper.style.position = 'fixed';
            wrapper.style.right = '20px';
            wrapper.style.bottom = '20px';
            wrapper.style.zIndex = '99999';
            wrapper.style.display = 'flex';
            wrapper.style.alignItems = 'center';

            const tooltip = document.createElement('div');
            tooltip.className = 'restart-tour-tooltip';
            tooltip.textContent = 'Try entering admin / admin123 and click Access Dashboard';

            const btn = document.createElement('button');
            btn.id = 'restart-tour-btn';
            btn.className = 'restart-tour-btn';
            btn.setAttribute('aria-label', 'Restart tour');
            btn.title = 'Restart tour';
            btn.innerHTML = '<span style="font-weight:700;font-size:20px;line-height:1">?</span>';
            btn.addEventListener('click', function () {
              try { localStorage.removeItem(STORAGE_KEY); } catch(e){}
              if (window.startLoginTour) window.startLoginTour();
            });

            wrapper.appendChild(tooltip);
            wrapper.appendChild(btn);
            document.body.appendChild(wrapper);

            setTimeout(function () {
              tooltip.style.opacity = '1';
              btn.style.transform = 'scale(1)';
            }, 10);
          }

          function hideLoginRestartButton() {
            const wrapper = document.getElementById('restart-tour-wrapper');
            if (wrapper) wrapper.remove();
          }

          // Add same minimal CSS used on home page for restart button
          (function ensureRestartStyles(){
            if (document.getElementById('persev-restart-styles')) return;
            const styleEl = document.createElement('style');
            styleEl.id = 'persev-restart-styles';
            styleEl.textContent = `
              .restart-tour-btn{width:56px;height:56px;border-radius:50%;background:#081032;color:#fff;border:4px solid #BE8E30;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,0.2);cursor:pointer;transition:transform .15s ease,box-shadow .15s;transform:scale(0);outline:none}
              .restart-tour-btn:hover{box-shadow:0 10px 25px rgba(0,0,0,0.3);transform:scale(1.05)}
              .restart-tour-tooltip{background:#081032;color:white;padding:8px 12px;border-radius:999px;margin-right:10px;border:2px solid #BE8E30;white-space:nowrap;opacity:0;transition:opacity .2s ease;font-weight:600}
            `;
            document.head.appendChild(styleEl);
          })();

          // Auto-start tour if not seen before
          document.addEventListener('DOMContentLoaded', function() {
            try {
              const seen = localStorage.getItem(STORAGE_KEY);
              if (!seen) {
                // small delay so page elements are fully rendered
                setTimeout(() => { window.startLoginTour(); }, 300);
              } else {
                // show restart button so users can re-run the tour
                showLoginRestartButton();
              }
            } catch(e) { console.warn('tour storage error', e); }
          });
        })();
    </script>
</body>
</html>
